<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>zhu-11 · 个人主页</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0f1e 0%, #1a1a3e 50%, #0f0f2e 100%);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 60px 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
    }
    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6c5ce7, #a855f7);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 42px;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 8px 32px rgba(108, 92, 231, 0.3);
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #fff;
    }
    .tagline {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 32px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .link-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      color: #e0e0e0;
      text-decoration: none;
      font-size: 15px;
      transition: all 0.2s;
    }
    .link-item:hover {
      background: rgba(255,255,255,0.12);
      transform: translateX(4px);
    }
    .link-icon {
      font-size: 20px;
      width: 32px;
      text-align: center;
    }
    .footer {
      margin-top: 32px;
      font-size: 12px;
      color: rgba(255,255,255,0.25);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">Z</div>
    <h1>zhu-11</h1>
    <p class="tagline">正在学习编程，用代码建造有趣的东西。</p>
    <div class="links">
      <a class="link-item" href="https://github.com/zhu-11">
        <span class="link-icon">🐙</span> GitHub 主页
      </a>
      <a class="link-item" href="https://github.com/zhu-11/my-notes">
        <span class="link-icon">📝</span> 我的笔记
      </a>
      <a class="link-item" href="https://github.com/zhu-11/awesome-react">
        <span class="link-icon">⚛️</span> Awesome React
      </a>
      <a class="link-item" href="https://github.com/zhu-11/project-based-learning">
        <span class="link-icon">📚</span> 项目学习教程
      </a>
    </div>
    <p class="footer">Built with GitHub Pages · 2026</p>
  </div>
</body>
</html>
